<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AUOPIIIA</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box}

html{
  scroll-behavior:smooth;
}

body{
  margin:0;
  background:#020202;
  color:white;
  font-family:"Cormorant Garamond",serif;
  font-weight:300;
  overflow:hidden;
}

body::before{
  content:"";
  position:fixed;
  inset:-30%;
  background:
    radial-gradient(circle at 25% 28%,rgba(255,255,255,.035),transparent 28%),
    radial-gradient(circle at 72% 60%,rgba(120,0,0,.055),transparent 34%),
    radial-gradient(circle at 45% 86%,rgba(255,255,255,.018),transparent 30%);
  filter:blur(44px);
  animation:atmosphere 38s infinite alternate ease-in-out;
  z-index:0;
  pointer-events:none;
}

@keyframes atmosphere{
  from{transform:translate(-2%,-1%) scale(1)}
  to{transform:translate(2%,2%) scale(1.08)}
}

/* LANDING */

.landing{
  position:relative;
  z-index:2;
  height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  transition:1.55s cubic-bezier(.72,0,.16,1);
  transform-origin:center center;
}

.landing.portal{
  transform:scale(9);
  opacity:0;
  filter:blur(42px);
}

.symbol{
  width:min(350px,68vw);
  opacity:.96;
  animation:symbolBreath 8s infinite ease-in-out;
  transition:1.55s cubic-bezier(.78,0,.12,1);
  transform-origin:center center;
}

.symbol.portal{
  transform:scale(23);
  opacity:0;
  filter:blur(58px) drop-shadow(0 0 120px rgba(150,0,0,.88));
}

@keyframes symbolBreath{
  0%,100%{
    transform:scale(1);
    filter:drop-shadow(0 0 3px rgba(120,0,0,.05));
  }
  50%{
    transform:scale(1.022);
    filter:drop-shadow(0 0 22px rgba(120,0,0,.24));
  }
}

.crossWrap{
  margin-top:58px;
  padding:13px 20px 12px 25px;
  border:1px solid rgba(150,0,0,0);
  opacity:0;
  cursor:pointer;
  animation:crossAppear 1.4s forwards 1.1s;
  transition:border-color .65s ease, box-shadow .65s ease, transform .65s ease;
}

.cross{
  font-size:18px;
  letter-spacing:.42em;
  color:rgba(255,255,255,.58);
  transition:color .65s ease,text-shadow .65s ease;
}

.crossWrap:hover{
  border-color:rgba(150,0,0,.65);
  box-shadow:0 0 18px rgba(120,0,0,.22), inset 0 0 18px rgba(120,0,0,.08);
  transform:translateY(-1px);
}

.crossWrap:hover .cross{
  color:rgba(255,255,255,.88);
  text-shadow:0 0 10px rgba(150,0,0,.55),0 0 28px rgba(120,0,0,.28);
}

.crossWrap.active{
  border-color:rgba(220,0,0,.95);
  box-shadow:0 0 28px rgba(180,0,0,.55),inset 0 0 24px rgba(160,0,0,.18);
}

.crossWrap.active .cross{
  color:white;
  text-shadow:0 0 18px rgba(220,0,0,.95),0 0 55px rgba(200,0,0,.55);
}

@keyframes crossAppear{
  to{opacity:1}
}

/* ECG */

.ecgPage{
  display:none;
  height:100vh;
  position:relative;
  z-index:2;
  align-items:center;
  justify-content:center;
  opacity:0;
}

.ecgPage.show{
  display:flex;
  animation:fadeIn 1s forwards;
}

.ecgPage.fadeOut{
  opacity:0;
  filter:blur(16px);
  transition:1s ease;
}

@keyframes fadeIn{
  to{opacity:1}
}

.ecgBox{
  width:min(980px,92vw);
  height:230px;
  position:relative;
  display:flex;
  align-items:center;
  justify-content:center;
}

.ecgBox svg{
  width:100%;
  height:100%;
  overflow:visible;
}

.ecgLine{
  fill:none;
  stroke:#9d0000;
  stroke-width:2;
  stroke-linecap:round;
  stroke-linejoin:round;
  filter:drop-shadow(0 0 8px rgba(160,0,0,.72));
  stroke-dasharray:2200;
  stroke-dashoffset:2200;
  animation:ecgDraw 4.8s cubic-bezier(.74,0,.22,1) forwards;
}

@keyframes ecgDraw{
  0%{stroke-dashoffset:2200;opacity:0}
  12%{opacity:1}
  100%{stroke-dashoffset:0;opacity:1}
}

/* ARCHIVE */

.archive{
  display:none;
  position:relative;
  z-index:2;
  min-height:100vh;
  opacity:0;
  padding:145px 20px 140px;
}

.archive.show{
  display:block;
  animation:archiveIn 1.3s ease forwards;
}

@keyframes archiveIn{
  from{opacity:0;transform:translateY(28px);filter:blur(12px)}
  to{opacity:1;transform:translateY(0);filter:blur(0)}
}

.header{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:115px;
  display:flex;
  align-items:flex-start;
  justify-content:center;
  padding-top:26px;
  z-index:20;
  pointer-events:none;
  background:linear-gradient(to bottom,rgba(2,2,2,.94),rgba(2,2,2,0));
}

.headerLogo{
  width:min(360px,48vw);
  opacity:.88;
}

.contactArea{
  position:fixed;
  top:32px;
  right:28px;
  z-index:25;
  text-align:right;
}

.contact{
  background:none;
  border:none;
  color:rgba(255,255,255,.62);
  font-family:"Cormorant Garamond",serif;
  font-weight:300;
  font-size:17px;
  letter-spacing:.28em;
  cursor:pointer;
}

.email{
  margin-top:10px;
  font-size:14px;
  letter-spacing:.06em;
  color:rgba(255,255,255,.45);
  opacity:0;
  transition:.45s ease;
}

.email.show{
  opacity:1;
}

.gallery{
  width:100%;
}

.art{
  width:min(780px,92vw);
  margin:0 auto 150px;
}

.art img{
  width:100%;
  max-height:86vh;
  object-fit:contain;
  display:block;
  cursor:pointer;
}

.title{
  margin-top:18px;
  text-align:left;
  font-size:21px;
  letter-spacing:.12em;
  color:rgba(255,255,255,.68);
}

/* VIEWER */

.viewer{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.96);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:100;
  padding:24px;
}

.viewer.open{
  display:flex;
}

.viewer img{
  max-width:96vw;
  max-height:90vh;
  object-fit:contain;
}

.close{
  position:fixed;
  top:22px;
  right:28px;
  background:none;
  border:none;
  color:rgba(255,255,255,.75);
  font-family:"Cormorant Garamond",serif;
  font-size:34px;
  cursor:pointer;
}

@media(max-width:700px){
  .symbol{width:min(285px,72vw)}
  .crossWrap{margin-top:50px;padding:11px 16px 10px 20px}
  .cross{font-size:15px;letter-spacing:.34em}
  .ecgBox{height:180px}
  .header{height:95px;padding-top:24px}
  .headerLogo{width:min(265px,56vw)}
  .contactArea{top:30px;right:18px}
  .contact{font-size:14px;letter-spacing:.2em}
  .email{font-size:12px}
  .archive{padding-top:125px}
  .art{margin-bottom:118px}
  .title{font-size:17px}
}
</style>
</head>

<body>

<section class="landing" id="landing">
  <img class="symbol" src="Symbol.webp" alt="AUOPIIIA symbol">

  <div class="crossWrap" id="crossWrap" onclick="crossOver()">
    <div class="cross">CROSS OVER</div>
  </div>
</section>

<section class="ecgPage" id="ecgPage">
  <div class="ecgBox">
    <svg viewBox="0 0 1000 240" preserveAspectRatio="xMidYMid meet">
      <path class="ecgLine" d="
        M20 120
        H150
        L168 96
        L185 162
        L210 48
        L236 148
        L256 120
        H305

        L330 70
        L355 120
        H383

        V72
        C383 156 455 156 455 72
        V120
        H492

        C492 70 570 70 570 120
        C570 170 492 170 492 120
        H610

        C610 70 690 70 690 120
        C690 170 610 170 610 120
        V185
        H735

        V72
        V185
        H795

        V72
        V185
        H855

        V72
        V185
        H905

        L930 70
        L955 120
        H980
      "/>
    </svg>
  </div>
</section>

<section class="archive" id="archive">

  <div class="header">
    <img class="headerLogo" src="A-LOGO.webp" alt="AUOPIIIA">
  </div>

  <div class="contactArea">
    <button class="contact" onclick="toggleContact()">CONTACT</button>
    <div class="email" id="email">contact.auopiiia@gmail.com</div>
  </div>

  <div class="gallery">

    <div class="art">
      <img src="Starborn-child.webp" alt="THE STARBORN CHILD">
      <div class="title">THE STARBORN CHILD</div>
    </div>

    <div class="art">
      <img src="Inner-weather.webp" alt="THE INNER WEATHER">
      <div class="title">THE INNER WEATHER</div>
    </div>

    <div class="art">
      <img src="Impossible-heaven.webp" alt="THE IMPOSSIBLE HEAVEN">
      <div class="title">THE IMPOSSIBLE HEAVEN</div>
    </div>

    <div class="art">
      <img src="Offering.webp" alt="THE OFFERING">
      <div class="title">THE OFFERING</div>
    </div>

    <div class="art">
      <img src="Visitation.webp" alt="THE VISITATION">
      <div class="title">THE VISITATION</div>
    </div>

    <div class="art">
      <img src="Last-crown.webp" alt="THE. LAST. CROWN.">
      <div class="title">THE. LAST. CROWN.</div>
    </div>

    <div class="art">
      <img src="Remnant.webp" alt="THE REMNANT">
      <div class="title">THE REMNANT</div>
    </div>

    <div class="art">
      <img src="Mouth-of-spring.webp" alt="THE MOUTH OF SPRING">
      <div class="title">THE MOUTH OF SPRING</div>
    </div>

    <div class="art">
      <img src="Waiting-in-bloom.webp" alt="WAITING IN BLOOM">
      <div class="title">WAITING IN BLOOM</div>
    </div>

    <div class="art">
      <img src="Other-occupant.webp" alt="THE OTHER OCCUPANT">
      <div class="title">THE OTHER OCCUPANT</div>
    </div>

    <div class="art">
      <img src="Witness.webp" alt="THE WITNESS">
      <div class="title">THE WITNESS</div>
    </div>

  </div>
</section>

<div class="viewer" id="viewer" onclick="closeViewer()">
  <button class="close" onclick="closeViewer()">×</button>
  <img id="viewerImg">
</div>

<script>
let audioStarted=false;
let audioContext;
let humGain;

function startHum(){
  if(audioStarted)return;
  audioStarted=true;

  audioContext=new (window.AudioContext||window.webkitAudioContext)();

  const osc1=audioContext.createOscillator();
  const osc2=audioContext.createOscillator();
  humGain=audioContext.createGain();

  osc1.type="sine";
  osc2.type="sine";
  osc1.frequency.value=43;
  osc2.frequency.value=58;

  humGain.gain.value=.0001;

  osc1.connect(humGain);
  osc2.connect(humGain);
  humGain.connect(audioContext.destination);

  osc1.start();
  osc2.start();

  humGain.gain.exponentialRampToValueAtTime(.018,audioContext.currentTime+2.6);
}

function crossOver(){
  const cross=document.getElementById("crossWrap");
  const landing=document.getElementById("landing");
  const symbol=document.querySelector(".symbol");
  const ecg=document.getElementById("ecgPage");
  const archive=document.getElementById("archive");

  cross.classList.add("active");
  symbol.classList.add("portal");

  setTimeout(()=>{
    landing.classList.add("portal");
  },340);

  setTimeout(()=>{
    landing.style.display="none";
    startHum();
    ecg.classList.add("show");
  },1500);

  setTimeout(()=>{
    ecg.classList.add("fadeOut");
  },4500);

  setTimeout(()=>{
    ecg.style.display="none";
    archive.classList.add("show");
    document.body.style.overflowY="auto";
  },5450);
}

function toggleContact(){
  document.getElementById("email").classList.toggle("show");
}

document.querySelectorAll(".art img").forEach(img=>{
  img.addEventListener("click",function(e){
    e.stopPropagation();
    document.getElementById("viewerImg").src=this.src;
    document.getElementById("viewer").classList.add("open");
  });
});

function closeViewer(){
  document.getElementById("viewer").classList.remove("open");
}
</script>

</body>
</html>
