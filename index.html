<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  background:black;
  color:white;
  font-family:serif;
}

/* LANDING */
.landing{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  text-align:center;
}

.logo{
  width:80px;
  margin-bottom:20px;
  opacity:.9;
}

.enter{
  margin-top:20px;
  font-size:12px;
  letter-spacing:2px;
  opacity:.6;
}

/* FIELD */
.field{
  display:none;
  padding:80px 20px;
}

/* ART BLOCK */
.art{
  margin:140px auto;
  max-width:600px;
  opacity:.7;
  text-align:center;
}

.art:hover{
  opacity:1;
}

.art img{
  width:100%;
  max-width:520px;
  height:auto;
  display:block;
  margin:0 auto;
  object-fit:contain;
}

.title{
  margin-top:14px;
  opacity:.7;
  font-size:14px;
}
</style>
</head>

<body>

<!-- LANDING -->
<div class="landing" id="landing">
  <img src="IMG_0179 2.PNG" class="logo">
  <div>pearly gate</div>
  <div class="enter" onclick="enter()">CROSS OVER</div>
</div>

<!-- FIELD -->
<div class="field" id="field">

  <div class="art">
    <img src="Bleached Sin 2.jpg">
    <div class="title">Bleached Sin</div>
  </div>

  <div class="art">
    <img src="Fuk Nature 2.jpg">
    <div class="title">Fuk Nature</div>
  </div>

  <div class="art">
    <img src="Real World 2.jpg">
    <div class="title">Real World</div>
  </div>

  <div class="art">
    <img src="Innocence 2.jpg">
    <div class="title">Innocence</div>
  </div>

  <div class="art">
    <img src="Starlife 2.jpg">
    <div class="title">Starlife</div>
  </div>

  <div class="art">
    <img src="Ugly King 2.jpg">
    <div class="title">Ugly King</div>
  </div>

</div>

<script>
function enter(){
  document.getElementById("landing").style.display="none";
  document.getElementById("field").style.display="block";
}
</script>

</body>
</html>
